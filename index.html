<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Snake: Sør-Amerika – Flagg & Land</title>

<style>
:root{
  --bg:#020617;              /* mye mørkere */
  --card:#020617;
  --panel:#030b1f;
  --text:#f9fafb;            /* nesten helt hvit */
  --muted:#cbd5f5;           /* lysere grå */
  --accent:#4ade80;
  --danger:#f87171;
  --edge:#1e293b;

  --contrast:#020617;
  --choice:#020617;
  --choice-border:#64748b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,Segoe UI,Roboto,Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  min-height:100vh;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.wrap{
  display:grid;
  gap:14px;
  grid-template-columns: 1fr 360px;
  max-width:1200px;
  width:100%;
}

canvas#game{
  background:#000;
  border-radius:14px;
  box-shadow:0 0 0 2px #1f2937, 0 10px 30px rgba(0,0,0,.8);
}

.panel{
  background:var(--panel);
  border:1px solid var(--edge);
  border-radius:14px;
  padding:14px;
}

.panel h2{
  margin:0 0 8px 0;
  font-size:20px;
  color:#ffffff;
}

.row{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  background:#000;
  border:1px solid var(--edge);
  font-weight:600;
}

.btn{
  border:1px solid #64748b;
  background:#000;
  color:#fff;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.btn.primary{
  background:#15803d;
}

.btn.warn{
  background:#991b1b;
}

.small{
  font-size:13px;
  color:var(--muted);
}

/* QUIZ */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
}

.modal.open{display:flex}

.card{
  width:min(560px, calc(100vw - 32px));
  background:#000;
  border:2px solid #334155;
  border-radius:16px;
  padding:16px;
}

.qbox{
  background:#000;
  border:2px solid #475569;
  border-radius:12px;
  padding:14px;
}

.choices{
  display:grid;
  gap:12px;
  margin-top:12px;
}

.choice{
  background:#000;
  border:2px solid #94a3b8;
  border-radius:12px;
  padding:14px;
  cursor:pointer;
  font-size:16px;
  font-weight:600;
}

.choice:hover{
  background:#020617;
}

.choice.correct{
  outline:3px solid #4ade80;
}

.choice.wrong{
  outline:3px solid #f87171;
}

/* GAME OVER */

.gameover{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.9);
}

.gameover.open{display:flex}

.overcard{
  background:#000;
  border:2px solid #334155;
  padding:20px;
  border-radius:16px;
  text-align:center;
}

/* LISTS */

.listbox{
  background:#000;
  border:1px solid #334155;
  border-radius:12px;
  padding:10px;
}

.tag{
  padding:6px 8px;
  border-radius:999px;
  background:#020617;
  border:1px solid #475569;
  font-size:12px;
  font-weight:600;
}

.scorerow{
  display:flex;
  justify-content:space-between;
  padding:6px 8px;
  background:#000;
  border:1px solid #334155;
  border-radius:8px;
}

@media (max-width:1080px){
  .wrap{grid-template-columns:1fr}
}
</style>
</head>

</html>
